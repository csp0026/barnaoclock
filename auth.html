<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar a la Fiesta | BARNA O’CLOCK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="auth-page">

    <header>
        <nav>
            <a href="index.html" class="logo-navbar">
                <div class="logo-card-navbar">
                    <img src="./img/logoSmall.png" alt="BARNA O'CLOCK Logo">
                </div>
                <span class="logo-text">BARNA O'CLOCK</span>
            </a>

            <!-- Desktop Navigation -->
            <ul class="nav-menu">
                <li><a href="explorar.html">Explorar</a></li>
                <li><a href="nuevo-evento.html">Publicar Plan</a></li>
                <li><a href="auth.html" class="btn-login"><span class="login-text">Entrar / Registrarse</span><span class="login-icon">👤</span></a></li>
                <li><a href="auth-en.html" id="lang-toggle">EN</a></li>
            </ul>

            <!-- Mobile Hamburger Menu -->
            <button class="hamburger-menu" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- Mobile Navigation Dropdown -->
            <ul class="nav-menu-mobile" id="nav-menu-mobile">
                <li><a href="explorar.html">Explorar</a></li>
                <li><a href="nuevo-evento.html">Publicar Plan</a></li>
                <li><a href="auth.html" class="btn-login-mobile">Entrar / Registrarse</a></li>
                <li><a href="auth-en.html" class="lang-toggle-mobile">EN</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">

        <div class="auth-hero-logo">
            <h1>BARNA O’CLOCK</h1>
            <p>Tu acceso VIP a la noche de Barcelona</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">LOGIN</button>
                <button class="tab-btn" onclick="switchTab('registro')">REGISTRO</button>
            </div>

            <div class="auth-body">
                <!-- FORMULARIO LOGIN -->
                <form id="login-form" class="auth-form active">
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" placeholder="ejemplo@barna.com" required>
                    </div>

                    <div class="input-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            Recordarme en este dispositivo
                        </label>
                    </div>

                    <button type="submit" class="btn-main-auth">ENTRAR A LA FIESTA</button>
                </form>

                <!-- FORMULARIO REGISTRO -->
                <form id="registro-form" class="auth-form">
                    <div class="input-group">
                        <label for="register-username">Usuario</label>
                        <input type="text" id="register-username" placeholder="Tu nombre de usuario" required>
                    </div>

                    <div class="input-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" placeholder="ejemplo@barna.com" required>
                    </div>

                    <div class="input-group">
                        <label for="register-password">Contraseña</label>
                        <input type="password" id="register-password" placeholder="••••••••" required>
                    </div>

                    <div class="input-group">
                        <label for="register-password-confirm">Confirmar Contraseña</label>
                        <input type="password" id="register-password-confirm" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-main-auth">CREAR CUENTA</button>
                </form>

                <div class="separator" id="separator">
                    <span>o</span>
                </div>

                <div class="social-login" id="social-login">
                    <button class="btn-social google">
                        <i class="fab fa-google"></i> Entrar con Google
                    </button>
                    <button class="btn-social facebook">
                        <i class="fab fa-facebook-f"></i> Entrar con Facebook
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 BARNA O’CLOCK - Made in Barcelona</p>
    </footer>

    <script>
        function switchTab(type) {
            const buttons = document.querySelectorAll('.tab-btn');
            const loginForm = document.getElementById('login-form');
            const registroForm = document.getElementById('registro-form');
            const separator = document.getElementById('separator');
            const socialLogin = document.getElementById('social-login');

            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (type === 'login') {
                loginForm.classList.add('active');
                registroForm.classList.remove('active');
                separator.style.display = 'block';
                socialLogin.style.display = 'flex';
            } else if (type === 'registro') {
                loginForm.classList.remove('active');
                registroForm.classList.add('active');
                separator.style.display = 'none';
                socialLogin.style.display = 'none';
            }
        }
        // Hamburger Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const navMenuMobile = document.getElementById('nav-menu-mobile');

        // Toggle menu on hamburger click
        hamburger.addEventListener('click', function() {
            hamburger.classList.toggle('active');
            navMenuMobile.classList.toggle('active');
        });

        // Close menu when a link is clicked
        const mobileLinks = navMenuMobile.querySelectorAll('a');
        mobileLinks.forEach(link => {
            link.addEventListener('click', function() {
                hamburger.classList.remove('active');
                navMenuMobile.classList.remove('active');
            });
        });

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            const isClickOnMenu = navMenuMobile.contains(event.target);
            const isClickOnHamburger = hamburger.contains(event.target);
            
            if (!isClickOnMenu && !isClickOnHamburger && navMenuMobile.classList.contains('active')) {
                hamburger.classList.remove('active');
                navMenuMobile.classList.remove('active');
            }
        });    </script>

</body>

</html>

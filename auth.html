<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar a la Fiesta | BARNA O’CLOCK</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">

<header>
    <nav>
        <div class="logo">BARNA O’CLOCK 🕒</div>
        <ul>
            <li><a href="index.html" class="btn-back">Inicio</a></li>
            <li><a href="explorar.html">Explorar</a></li>
            <li><a href="nuevo-evento.html">Publicar Plan</a></li>            
            <li><a href="auth.html">Entrar / Registrarse</a></li>
        </ul>
    </nav>
</header>

<main class="auth-container">
    
    <div class="auth-hero-logo">
        <h1>BARNA O’CLOCK</h1>
        <p>Tu acceso VIP a la noche de Barcelona</p>
    </div>

    <div class="auth-card">
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">LOGIN</button>
            <button class="tab-btn" onclick="switchTab('registro')">REGISTRO</button>
        </div>

        <div class="auth-body">
            <form id="auth-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ejemplo@barna.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Recordarme en este dispositivo
                    </label>
                </div>

                <button type="submit" class="btn-main-auth">ENTRAR A LA FIESTA</button>
            </form>

            <div class="separator">
                <span>o</span>
            </div>

            <div class="social-login">
                <button class="btn-social google">
                    <i class="fab fa-google"></i> Entrar con Google
                </button>
                <button class="btn-social facebook">
                    <i class="fab fa-facebook-f"></i> Entrar con Facebook
                </button>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 BARNA O’CLOCK - Made in Barcelona</p>
</footer>

<script>
    function switchTab(type) {
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        // Aquí podrías cambiar la acción del form o mostrar/ocultar campos
    }
</script>

</body>
</html>
